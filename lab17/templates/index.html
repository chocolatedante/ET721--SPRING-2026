<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images Uploader App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='imguploader_style.css') }}">
</head>
<body>
    <h1 class="title">Upload Image by Dante Vanderpool</h1>

    <form id="uploadForm">
        <input type="file" name="image" id="imageInput" required>
        <button type="submit" class="btnupload">Upload</button>
    </form>

    <p id="message"></p>

    <h2 class="subtitle">Gallery</h2>
    <div class="gallery" id="gallery">
        {% for image in images %}
        <div class="card" id="images-{{image.id}}">
            <img src="{{ url_for('static', filename='uploads/'+image.filename)}}">
            <button onclick="deleteImage({{image.id}})" clas="btndelete">Delete</button>
        </div>
        {% endfor %}
        
    </div>

    <script src="{{ url_for('static', filename='imguploader_script.js') }}"></script>
</body>
</html>
