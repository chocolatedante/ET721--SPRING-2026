<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images Uploader App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='imguploader_style.css') }}">
</head>
<body>
    <h1 class="title">Upload Image Dante Vanderpool</h1>

    <form id="uploadForm">
        <input type="file" name="image" id="imageInput" required>
        <button type="submit" class="btnupload">Upload</button>
    </form>

    <p id="message">Testing</p>

    <h2 class="subtitle">Gallery</h2>
    <div class="gallery" id="gallery">
        <div class="card">
            <img src="{{ url_for('static', filename='uploads/snailimage.jpg') }}" alt="Snail image">
        </div>
    </div>

    <script src="{{ url_for('static', filename='imguploader_script.js') }}"></script>
</body>
</html>
